name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch: # Allows you to start it manually
  schedule:
    - cron: '*/20 * * * *' # Restarts every 20 mins to stay alive

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bot
        run: npm install mineflayer prismarine-realms

      - name: Run Bot
        run: |
          node -e "
          const mineflayer = require('mineflayer');
          const bot = mineflayer.createBot({
            host: 'hackersmp123492.mcsh.io', 
            port: 19132,
            username: 'AFK_Bot',
            version: '1.26.20' // Set this to your exact version
          });
          bot.on('spawn', () => console.log('Bot joined the server!'));
          bot.on('error', (err) => console.log(err));
          setTimeout(() => process.exit(0), 1140000); // Runs for 19 mins
          "
