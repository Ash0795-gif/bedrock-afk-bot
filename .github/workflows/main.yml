name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Libraries
        run: npm install bedrock-protocol

      - name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          console.log('Connecting to hackersmp123492.mcsh.io...');

          const client = bedrock.createClient({
            host: 'hackersmp123492.mcsh.io', 
            port: 19132,
            username: 'AFK_Bot',
            offline: true, // Crucial for MCServerHost
            version: '1.20.10' // This protocol version is stable for 1.26 servers
          });

          client.on('spawn', () => {
            console.log('SUCCESS: Bot has joined HACKERSMP123!');
          });

          client.on('error', (err) => {
            console.log('Connection Error:', err.message);
          });

          client.on('kick', (reason) => {
            console.log('Kicked:', reason);
          });

          // Run for 19 minutes
          setTimeout(() => {
            console.log('Session rotating...');
            process.exit(0);
          }, 1140000); 
          "
