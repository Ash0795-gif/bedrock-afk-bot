name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Restarts every hour

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Libraries
        run: npm install mineflayer mineflayer-bedrock

      - name: Run Force-Bot
        run: |
          node -e "
          const mineflayer = require('mineflayer');
          const bedrock = require('mineflayer-bedrock');

          console.log('Connecting to hackersmp123492.mcsh.io...');

          const bot = mineflayer.createBot({
            host: 'hackersmp123492.mcsh.io',
            port: 19132,
            username: 'AFK_Bot',
            offline: true, // Crucial for non-Microsoft login
            version: false, // Auto-detect version
            bedrock: true
          });

          bot.on('spawn', () => {
            console.log('Success! Bot is online.');
            // Anti-AFK: Move head slightly every 30 seconds
            setInterval(() => {
              bot.look(Math.random() * 360, 0);
            }, 30000);
          });

          bot.on('error', (err) => {
            console.error('Error:', err.message);
            if (err.message.includes('version')) {
               console.log('Try changing version to 1.20.80 or 1.21.0');
            }
          });

          bot.on('kicked', (reason) => console.log('Kicked:', reason));

          // Run for 55 minutes
          setTimeout(() => process.exit(0), 3300000);
          "
