- name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          const client = bedrock.createClient({
            host: 'hackersmp123492.mcsh.io', 
            port: 19132,
            username: 'AFK_Bot', // Forces the name we want
            offline: true,
            version: '1.21.0' // Matches the protocol your console is asking for
          });

          client.on('spawn', () => {
            console.log('BOT IS IN! Check the console for AFK_Bot.');
          });

          client.on('error', (err) => console.log('Error:', err.message));

          // Stay for 19 mins
          setTimeout(() => process.exit(0), 1140000); 
          "
