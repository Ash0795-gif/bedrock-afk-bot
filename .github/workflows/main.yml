name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install bedrock-protocol

      - name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          console.log('Forcing connection to hackersmp123492.mcsh.io...');

          const client = bedrock.createClient({
            host: 'hackersmp123492.mcsh.io', 
            port: 19132,
            username: 'AFK_Bot', 
            offline: true,
            skipPing: false // Added to help the dashboard 'see' the bot
          });

          client.on('spawn', () => {
            console.log('SUCCESS: AFK_Bot is officially in the world!');
          });

          client.on('error', (err) => {
            console.log('Error Log:', err.message);
          });

          client.on('close', () => console.log('Connection closed.'));

          // Run for 19 mins
          setTimeout(() => process.exit(0), 1140000); 
          "
