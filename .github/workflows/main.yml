name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install bedrock-protocol

      - name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          console.log('Attempting Heavy Handshake...');

          const client = bedrock.createClient({
            host: '163.5.201.8', 
            port: 12323, 
            username: 'AFK_Bot', 
            offline: true,
            version: '1.21.0',
            connectTimeout: 30000, // Wait longer for the server to answer
            viewDistance: 4       // Mimic low-end device
          });

          client.on('spawn', () => {
            console.log('SUCCESS: BOT IS FINALLY IN!');
          });

          client.on('error', (err) => {
            console.log('FAIL: ' + err.message);
          });

          client.on('close', () => console.log('Server kicked the bot.'));

          setTimeout(() => {
            console.log('19 mins finished.');
            process.exit(0);
          }, 1140000); 
          "
