name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated for 2026 standards

      - name: Install Bot
        run: npm install mineflayer mineflayer-bedrock

      - name: Run Bot
        run: |
          node -e "
          const mineflayer = require('mineflayer');
          const bedrock = require('mineflayer-bedrock');
          
          console.log('Attempting to connect to hackersmp123492.mcsh.io...');

          const bot = mineflayer.createBot({
            host: 'hackersmp123492.mcsh.io', 
            port: 19132,
            username: 'AFK_Bot',
            version: false, // This forces the bot to auto-detect 1.26.20
            bedrock: true
          });

          bot.on('spawn', () => {
            console.log('SUCCESS: Bot is now standing in the server!');
          });

          bot.on('error', (err) => {
            console.error('CRITICAL ERROR:', err.message);
            process.exit(1); 
          });

          bot.on('kicked', (reason) => {
            console.log('Kicked by server:', reason);
          });
          
          // Stay for 19 mins
          setTimeout(() => {
            console.log('Shutting down bot for rotation.');
            process.exit(0);
          }, 1140000); 
          "
