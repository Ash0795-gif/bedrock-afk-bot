name: Minecraft Bedrock Keep-Alive
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  ping-job:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install bedrock-protocol

      - name: Run Ping Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          async function keepAlive() {
            for (let i = 0; i < 20; i++) { // Ping for ~10 minutes
              try {
                const response = await bedrock.ping({ host: '163.5.201.8', port: 12323 });
                console.log('Ping Successful: Server is AWAKE. Players: ' + response.playersOnline);
              } catch (e) {
                console.log('Ping Failed: ' + e.message);
              }
              await new Promise(r => setTimeout(r, 30000));
            }
          }
          keepAlive();
          "
