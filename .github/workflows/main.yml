name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *' # Increased frequency to prevent sleep

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install bedrock-protocol

      - name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          console.log('Attempting connection to 163.5.201.8:12323...');

          const client = bedrock.createClient({
            host: '163.5.201.8', 
            port: 12323, 
            username: 'AFK_Bot', 
            offline: true,
            version: '1.21.0', // Handshake for 1.26 servers
            skipPing: false    // We WANT to ping to wake the server up
          });

          client.on('spawn', () => {
            console.log('SUCCESS: AFK_Bot is in the world!');
          });

          client.on('error', (err) => {
            console.log('REJECTED: ' + err.message);
          });

          client.on('close', () => {
            console.log('Connection closed by host. Retrying in next cycle...');
          });

          // Run for 14 minutes
          setTimeout(() => process.exit(0), 840000); 
          "
