name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install bedrock-protocol

      - name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          console.log('Using Mobile-Mask Connection on Port 13907...');

          const client = bedrock.createClient({
            host: '163.5.201.8', 
            port: 13907, // Switching to your secondary port allocation
            username: 'AFK_Bot', 
            offline: true,
            version: '1.21.0',
            raknetBackend: 'raknet-native' // Forces a more realistic network connection
          });

          client.on('spawn', () => {
            console.log('SUCCESS: THE BOT IS IN!');
          });

          client.on('error', (err) => {
            console.log('FAIL: ' + err.message);
          });

          client.on('disconnect', (packet) => {
            console.log('DISCONNECT REASON: ' + packet.message);
          });

          setTimeout(() => process.exit(0), 1140000); 
          "
