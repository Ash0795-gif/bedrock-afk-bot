name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install bedrock-protocol

      - name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          console.log('Starting Force-Connection...');

          const client = bedrock.createClient({
            host: 'hackersmp123492.mcsh.io', 
            port: 19132,
            username: 'AFK_Bot', 
            offline: true,
            version: '1.21.0',
            skipPing: true // This prevents the 'Connection closed' error
          });

          client.on('spawn', () => {
            console.log('SUCCESS: The bot is officially online!');
          });

          client.on('error', (err) => {
            console.log('Connection Failed:', err.message);
          });

          client.on('disconnect', (packet) => {
            console.log('Disconnected by server. Reason:', packet.reason);
          });

          // Stay online for 19 mins
          setTimeout(() => process.exit(0), 1140000); 
          "
