name: Minecraft Bedrock AFK Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  afk-job:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install bedrock-protocol

      - name: Run Bot
        run: |
          node -e "
          const bedrock = require('bedrock-protocol');
          
          const client = bedrock.createClient({
            host: '163.5.201.8', 
            port: 12323, 
            username: 'AFK_Bot', 
            offline: true,
            version: '1.21.0'
          });

          client.on('spawn', () => console.log('SUCCESS: AFK_Bot is in!'));
          client.on('error', (err) => console.log('FAIL:', err.message));
          
          setTimeout(() => process.exit(0), 1140000); 
          "
